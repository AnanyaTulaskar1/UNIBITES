<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="Arial" font-size="28" fill="#111">ER Diagram</text>

  <rect x="70" y="140" width="260" height="170" rx="12" fill="#f0f4ff" stroke="#4a67d6" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Users</text>
  <text x="90" y="205" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="90" y="230" font-family="Arial" font-size="14" fill="#333">- name</text>
  <text x="90" y="255" font-family="Arial" font-size="14" fill="#333">- email</text>
  <text x="90" y="280" font-family="Arial" font-size="14" fill="#333">- role</text>

  <rect x="470" y="120" width="260" height="220" rx="12" fill="#fff3e8" stroke="#d6792c" stroke-width="2"/>
  <text x="600" y="155" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Orders</text>
  <text x="490" y="185" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="490" y="210" font-family="Arial" font-size="14" fill="#333">- user_id (FK)</text>
  <text x="490" y="235" font-family="Arial" font-size="14" fill="#333">- shop_key</text>
  <text x="490" y="260" font-family="Arial" font-size="14" fill="#333">- token_code</text>
  <text x="490" y="285" font-family="Arial" font-size="14" fill="#333">- status</text>
  <text x="490" y="310" font-family="Arial" font-size="14" fill="#333">- total_amount</text>

  <rect x="870" y="140" width="260" height="170" rx="12" fill="#e9f8ef" stroke="#2f9e5a" stroke-width="2"/>
  <text x="1000" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Order_Items</text>
  <text x="890" y="205" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="890" y="230" font-family="Arial" font-size="14" fill="#333">- order_id (FK)</text>
  <text x="890" y="255" font-family="Arial" font-size="14" fill="#333">- item_name</text>
  <text x="890" y="280" font-family="Arial" font-size="14" fill="#333">- qty</text>

  <line x1="330" y1="225" x2="470" y2="225" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="730" y1="225" x2="870" y2="225" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>
  <text x="800" y="210" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#333" />
    </marker>
  </defs>
</svg>
