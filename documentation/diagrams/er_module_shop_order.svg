<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="Arial" font-size="26" fill="#111">ER Diagram (Module 2: Shop &amp; Order Management)</text>

  <rect x="80" y="160" width="320" height="200" rx="12" fill="#ffeef0" stroke="#d6455d" stroke-width="2"/>
  <text x="240" y="195" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Shops</text>
  <text x="100" y="225" font-family="Arial" font-size="14" fill="#333">- shop_key (PK)</text>
  <text x="100" y="250" font-family="Arial" font-size="14" fill="#333">- shop_name</text>
  <text x="100" y="275" font-family="Arial" font-size="14" fill="#333">- location</text>

  <rect x="500" y="130" width="320" height="240" rx="12" fill="#fff3e8" stroke="#d6792c" stroke-width="2"/>
  <text x="660" y="165" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Orders</text>
  <text x="520" y="195" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="520" y="220" font-family="Arial" font-size="14" fill="#333">- shop_key (FK)</text>
  <text x="520" y="245" font-family="Arial" font-size="14" fill="#333">- token_code</text>
  <text x="520" y="270" font-family="Arial" font-size="14" fill="#333">- status</text>
  <text x="520" y="295" font-family="Arial" font-size="14" fill="#333">- total_amount</text>

  <rect x="880" y="160" width="260" height="200" rx="12" fill="#e9f8ef" stroke="#2f9e5a" stroke-width="2"/>
  <text x="1010" y="195" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Order_Items</text>
  <text x="900" y="225" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="900" y="250" font-family="Arial" font-size="14" fill="#333">- order_id (FK)</text>
  <text x="900" y="275" font-family="Arial" font-size="14" fill="#333">- item_name</text>
  <text x="900" y="300" font-family="Arial" font-size="14" fill="#333">- qty</text>

  <line x1="400" y1="260" x2="500" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="260" x2="880" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="450" y="245" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>
  <text x="850" y="245" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#333" />
    </marker>
  </defs>
</svg>
