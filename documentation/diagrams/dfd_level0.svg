<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="Arial" font-size="28" fill="#111">Data Flow Diagram (Level 0)</text>

  <rect x="80" y="160" width="240" height="120" rx="12" fill="#f0f4ff" stroke="#4a67d6" stroke-width="2"/>
  <text x="200" y="215" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">User</text>

  <rect x="880" y="160" width="240" height="120" rx="12" fill="#f0f4ff" stroke="#4a67d6" stroke-width="2"/>
  <text x="1000" y="215" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Shop Owner</text>

  <rect x="430" y="140" width="340" height="180" rx="14" fill="#fff3e8" stroke="#d6792c" stroke-width="2"/>
  <text x="600" y="205" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">UniBites System</text>
  <text x="600" y="235" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Order Placement + Status</text>

  <rect x="470" y="390" width="260" height="120" rx="12" fill="#e9f8ef" stroke="#2f9e5a" stroke-width="2"/>
  <text x="600" y="445" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Orders Database</text>

  <line x1="320" y1="220" x2="430" y2="220" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="220" x2="880" y2="220" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="320" x2="600" y2="390" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="375" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Order Request</text>
  <text x="825" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Order Status</text>
  <text x="620" y="365" text-anchor="start" font-family="Arial" font-size="14" fill="#333">Store/Retrieve</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#333" />
    </marker>
  </defs>
</svg>
