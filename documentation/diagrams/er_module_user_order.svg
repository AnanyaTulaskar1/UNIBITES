<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="Arial" font-size="26" fill="#111">ER Diagram (Module 1: User &amp; Order Flow)</text>

  <rect x="80" y="150" width="320" height="220" rx="12" fill="#f0f4ff" stroke="#4a67d6" stroke-width="2"/>
  <text x="240" y="185" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Users</text>
  <text x="100" y="215" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="100" y="240" font-family="Arial" font-size="14" fill="#333">- name</text>
  <text x="100" y="265" font-family="Arial" font-size="14" fill="#333">- email</text>
  <text x="100" y="290" font-family="Arial" font-size="14" fill="#333">- role</text>

  <rect x="500" y="120" width="320" height="260" rx="12" fill="#fff3e8" stroke="#d6792c" stroke-width="2"/>
  <text x="660" y="155" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Orders</text>
  <text x="520" y="185" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="520" y="210" font-family="Arial" font-size="14" fill="#333">- user_id (FK)</text>
  <text x="520" y="235" font-family="Arial" font-size="14" fill="#333">- token_code</text>
  <text x="520" y="260" font-family="Arial" font-size="14" fill="#333">- status</text>
  <text x="520" y="285" font-family="Arial" font-size="14" fill="#333">- total_amount</text>
  <text x="520" y="310" font-family="Arial" font-size="14" fill="#333">- created_at</text>

  <rect x="890" y="150" width="260" height="200" rx="12" fill="#e9f8ef" stroke="#2f9e5a" stroke-width="2"/>
  <text x="1020" y="185" text-anchor="middle" font-family="Arial" font-size="18" fill="#111">Order_Items</text>
  <text x="910" y="215" font-family="Arial" font-size="14" fill="#333">- id (PK)</text>
  <text x="910" y="240" font-family="Arial" font-size="14" fill="#333">- order_id (FK)</text>
  <text x="910" y="265" font-family="Arial" font-size="14" fill="#333">- item_name</text>
  <text x="910" y="290" font-family="Arial" font-size="14" fill="#333">- qty</text>

  <line x1="400" y1="245" x2="500" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="245" x2="890" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="450" y="230" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>
  <text x="855" y="230" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 to many</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#333" />
    </marker>
  </defs>
</svg>
